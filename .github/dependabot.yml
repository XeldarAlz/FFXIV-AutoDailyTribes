version: 2
updates:
  - package-ecosystem: nuget
    directory: /AutoDailyTribes
    schedule:
      interval: weekly
    allow:
      - dependency-name: croizat.clib
    commit-message:
      prefix: deps
    labels:
      - dependencies

  - package-ecosystem: gitsubmodule
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 1
    commit-message:
      prefix: deps
    labels:
      - dependencies
      - submodule
